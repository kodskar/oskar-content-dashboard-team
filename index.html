<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Oskar Content Dashboard</title>
  <style>
    :root {
      --bg: #f6f4ee;
      --panel: #ffffff;
      --ink: #172026;
      --muted: #5f6970;
      --line: #d8d3c8;
      --green: #2f6f5e;
      --blue: #2b5c88;
      --gold: #b98218;
      --red: #a84646;
      --green-soft: #e8f2ee;
      --blue-soft: #e8f0f8;
      --gold-soft: #fbf2d9;
      --red-soft: #f7e9e7;
      --shadow: 0 14px 40px rgba(23, 32, 38, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      letter-spacing: 0;
    }

    button, select, input {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px 1fr;
    }

    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 28px 22px;
      border-right: 1px solid var(--line);
      background: #fbfaf6;
      overflow-y: auto;
    }

    main {
      padding: 32px 42px 64px;
      overflow-x: hidden;
    }

    .brand {
      margin-bottom: 26px;
    }

    .brand h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.05;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .nav {
      display: grid;
      gap: 8px;
      margin: 18px 0 28px;
    }

    .nav button {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--ink);
      background: transparent;
      text-align: left;
      cursor: pointer;
    }

    .nav button.active {
      background: var(--ink);
      color: #fff;
    }

    .nav .icon {
      width: 20px;
      text-align: center;
      font-size: 15px;
    }

    .side-block {
      padding-top: 20px;
      border-top: 1px solid var(--line);
      margin-top: 20px;
    }

    .side-block h2 {
      margin: 0 0 12px;
      font-size: 13px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .rule {
      margin: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-size: 14px;
      line-height: 1.38;
    }

    .topline {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 26px;
    }

    .topline h2 {
      margin: 0;
      font-size: 42px;
      line-height: 1.02;
    }

    .topline p {
      max-width: 720px;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.45;
    }

    .date-pill {
      flex: 0 0 auto;
      padding: 10px 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      font-size: 14px;
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }

    .kpi {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px 16px 14px;
      box-shadow: var(--shadow);
    }

    .kpi strong {
      display: block;
      font-size: 32px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .kpi span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.25;
    }

    .visual-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
      margin-top: 10px;
    }

    figure {
      margin: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      box-shadow: var(--shadow);
    }

    figure img {
      width: 100%;
      display: block;
    }

    figcaption {
      padding: 13px 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1.5fr) repeat(6, minmax(125px, 1fr));
      gap: 12px;
      align-items: center;
      margin: 12px 0 22px;
    }

    .toolbar input,
    .toolbar select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
    }

    .funnel {
      display: grid;
      grid-template-columns: repeat(4, minmax(220px, 1fr));
      gap: 16px;
      align-items: start;
    }

    .shootlist {
      margin: 0 0 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .shootlist-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .shootlist-head h3 {
      margin: 0;
      font-size: 20px;
    }

    .shootlist-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .ghost-btn,
    .select-btn,
    .copy-btn {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 9px 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .select-btn {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .select-btn.selected {
      background: var(--red);
      border-color: var(--red);
    }

    .shootlist-body {
      display: grid;
      grid-template-columns: repeat(4, minmax(200px, 1fr));
      gap: 12px;
      padding: 14px;
    }

    .export-text {
      width: calc(100% - 28px);
      min-height: 150px;
      margin: 0 14px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfaf6;
      color: var(--ink);
      padding: 12px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      line-height: 1.45;
      resize: vertical;
    }

    .modal-body .export-text {
      width: 100%;
      margin: 0;
      min-height: 130px;
    }

    .lane {
      min-height: 540px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,0.6);
      padding: 12px;
    }

    .lane h3 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 0 12px;
      font-size: 18px;
    }

    .lane h3 span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

	    .idea-card {
	      width: 100%;
	      margin: 0 0 10px;
	      padding: 13px;
      border: 1px solid var(--line);
      border-left-width: 5px;
      border-radius: 8px;
      background: #fff;
      text-align: left;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(23, 32, 38, 0.05);
    }

    .idea-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(23, 32, 38, 0.10);
    }

    .idea-card.selected {
      outline: 3px solid rgba(47, 111, 94, 0.25);
	      background: #fbfffd;
	    }

	    .card-top {
	      display: flex;
	      align-items: center;
	      justify-content: space-between;
	      gap: 10px;
	    }

	    .quick-select {
	      flex: 0 0 auto;
	      border: 1px solid var(--line);
	      border-radius: 7px;
	      background: #fff;
	      color: var(--ink);
	      padding: 6px 9px;
	      cursor: pointer;
	      font-size: 12px;
	      font-weight: 800;
	    }

	    .quick-select.on {
	      border-color: var(--green);
	      background: var(--green);
	      color: #fff;
	    }

	    .idea-card h4 {
	      margin: 8px 0 8px;
	      font-size: 16px;
      line-height: 1.22;
    }

    .idea-card .id {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .04em;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 3px 7px;
      border-radius: 6px;
      background: #f2f0e9;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .tag.priority-now { background: var(--green-soft); color: var(--green); }
    .tag.priority-sf { background: var(--blue-soft); color: var(--blue); }
    .tag.priority-strong { background: var(--gold-soft); color: var(--gold); }
    .tag.priority-consider { background: var(--red-soft); color: var(--red); }
    .tag.selected-tag { background: var(--green); color: #fff; }
    .tag.film-now { background: var(--green-soft); color: var(--green); }
    .tag.film-sf { background: var(--blue-soft); color: var(--blue); }
    .tag.film-partial { background: var(--gold-soft); color: var(--gold); }

    .all-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(250px, 1fr));
      gap: 14px;
    }

    .timeline {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 20px;
    }

    .phase {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 18px;
      min-height: 220px;
      box-shadow: var(--shadow);
    }

    .phase h3 {
      margin: 0 0 12px;
      font-size: 22px;
    }

    .phase ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.55;
    }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin: 0 0 22px;
    }

    .summary-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 16px;
      line-height: 1.38;
      box-shadow: var(--shadow);
    }

    .summary-card b {
      display: block;
      margin-bottom: 6px;
    }

    .summary-card span {
      color: var(--muted);
      font-size: 14px;
    }

    .image-fallback {
      display: none;
      padding: 26px;
      color: var(--muted);
      line-height: 1.45;
    }

    dialog {
      width: min(980px, calc(100vw - 36px));
      max-height: calc(100vh - 36px);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
      box-shadow: 0 28px 90px rgba(23, 32, 38, 0.28);
      overflow: auto;
    }

    dialog::backdrop {
      background: rgba(23, 32, 38, 0.42);
    }

    .modal-head {
      padding: 24px 26px 16px;
      border-bottom: 1px solid var(--line);
    }

    .modal-head h3 {
      margin: 8px 0 0;
      font-size: 28px;
      line-height: 1.1;
    }

    .modal-body {
      padding: 22px 26px 26px;
      display: grid;
      gap: 18px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .detail {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfaf6;
    }

    .detail b {
      display: block;
      margin-bottom: 5px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .detail span {
      font-size: 15px;
      line-height: 1.35;
    }

    .modal-copy {
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      line-height: 1.5;
      color: var(--ink);
    }

    .modal-section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 15px 18px;
    }

    .modal-section h4 {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    .modal-section ul {
      margin: 0;
      padding-left: 20px;
      line-height: 1.48;
      color: var(--ink);
    }

    .modal-section li + li {
      margin-top: 6px;
    }

    .modal-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 16px 26px 22px;
      border-top: 1px solid var(--line);
    }

    .modal-action-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .close {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      padding: 10px 14px;
      cursor: pointer;
    }

    .empty {
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: rgba(255,255,255,0.55);
      text-align: center;
    }

    @media (max-width: 1180px) {
      .app { grid-template-columns: 1fr; }
      aside {
        position: relative;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--line);
      }
      .nav { grid-template-columns: repeat(4, 1fr); }
      main { padding: 28px 22px 48px; }
      .kpis { grid-template-columns: repeat(3, 1fr); }
      .toolbar { grid-template-columns: 1fr 1fr; }
      .funnel { grid-template-columns: repeat(2, minmax(220px, 1fr)); }
      .shootlist-body { grid-template-columns: repeat(2, minmax(220px, 1fr)); }
      .all-grid { grid-template-columns: repeat(2, minmax(240px, 1fr)); }
      .timeline { grid-template-columns: 1fr; }
      .summary-strip { grid-template-columns: 1fr; }
    }

	    @media (max-width: 720px) {
	      .topline { display: block; }
	      .topline h2 { font-size: 32px; }
	      .date-pill { display: inline-block; margin-top: 16px; }
      .nav { grid-template-columns: 1fr 1fr; }
      .kpis,
      .toolbar,
      .funnel,
      .shootlist-body,
      .all-grid,
      .detail-grid { grid-template-columns: 1fr; }
	      .lane { min-height: auto; }
	    }

	    /* Simple team view */
	    .app {
	      display: block;
	    }

	    aside,
	    #overview,
	    #ideas,
	    #plan {
	      display: none !important;
	    }

	    main {
	      max-width: 1180px;
	      margin: 0 auto;
	      padding: 28px 24px 56px;
	    }

	    .topline {
	      align-items: flex-start;
	      margin-bottom: 16px;
	    }

	    .topline h2 {
	      max-width: 760px;
	      font-size: clamp(34px, 5vw, 56px);
	      letter-spacing: 0;
	    }

	    .topline p {
	      max-width: 660px;
	      margin-top: 8px;
	      font-size: 18px;
	    }

	    .toolbar {
	      grid-template-columns: minmax(260px, 420px);
	      margin: 18px 0 20px;
	    }

	    .toolbar input,
	    .toolbar select {
	      min-height: 46px;
	      font-size: 15px;
	    }

	    .shootlist {
	      box-shadow: none;
	      margin-bottom: 18px;
	    }

	    .shootlist.is-empty {
	      display: none;
	    }

	    .shootlist-head {
	      padding: 12px 14px;
	    }

	    .shootlist-body {
	      grid-template-columns: repeat(3, minmax(220px, 1fr));
	      padding: 12px;
	    }

	    .funnel {
	      grid-template-columns: repeat(2, minmax(0, 1fr));
	      gap: 18px;
	    }

	    .backlog {
	      grid-column: 1 / -1;
	      margin-top: 6px;
	      border-top: 1px solid var(--line);
	      padding-top: 12px;
	    }

	    .backlog summary {
	      cursor: pointer;
	      color: var(--muted);
	      font-weight: 800;
	      list-style-position: inside;
	    }

	    .backlog summary span {
	      float: right;
	      font-size: 13px;
	    }

	    .backlog-grid {
	      display: grid;
	      grid-template-columns: repeat(2, minmax(0, 1fr));
	      gap: 10px 18px;
	      margin-top: 12px;
	    }

	    .lane {
	      min-height: 0;
	      border: 0;
	      background: transparent;
	      padding: 0;
	    }

	    .lane h3 {
	      padding: 0 0 8px;
	      border-bottom: 1px solid var(--line);
	    }

	    .idea-card {
	      border-left-width: 1px;
	      box-shadow: none;
	      margin-bottom: 8px;
	      padding: 12px;
	    }

	    .idea-card:hover {
	      transform: none;
	      box-shadow: none;
	      border-color: #bdb7aa;
	    }

	    .idea-card h4 {
	      margin: 8px 0 6px;
	      font-size: 17px;
	    }

	    .concept {
	      margin: 0;
	      color: var(--muted);
	      font-size: 14px;
	      line-height: 1.4;
	    }

	    .tags {
	      margin-top: 9px;
	    }

	    .open-brief {
	      display: inline-block;
	      margin-top: 10px;
	      color: var(--muted);
	      font-size: 13px;
	      font-weight: 800;
	    }

	    .modal-status {
	      margin: 10px 0 0;
	      color: var(--muted);
	      font-size: 15px;
	    }

	    .quick-select {
	      min-height: 34px;
	      padding: 6px 10px;
	    }

	    @media (max-width: 900px) {
	      .funnel,
	      .backlog-grid,
	      .shootlist-body {
	        grid-template-columns: 1fr;
	      }
	      .toolbar {
	        grid-template-columns: 1fr 1fr;
	      }
	    }

	    @media (max-width: 560px) {
	      main {
	        padding: 20px 14px 44px;
	      }
	      .topline p {
	        font-size: 16px;
	      }
	      .toolbar {
	        grid-template-columns: 1fr;
	      }
	      .shootlist-head,
	      .modal-actions {
	        align-items: stretch;
	        flex-direction: column;
	      }
	    }
	  </style>
</head>
<body>
	  <div class="app">
	    <main>
	      <section id="funnel" class="section active">
	        <div class="topline">
		          <div>
		            <h2>Velg hva vi filmer</h2>
		            <p>Ekte bygging, ekte kunder, ekte founder-proof.</p>
		          </div>
		        </div>
		        <div class="toolbar" id="toolbar"></div>
	        <div class="shootlist">
	          <div class="shootlist-head">
	            <h3>Shootliste <span class="tag selected-tag" id="selectedCount">0 valgt</span></h3>
	            <div class="shootlist-actions">
	              <button class="ghost-btn" id="copySelected">Kopier valgte</button>
	            </div>
	          </div>
	          <div class="shootlist-body" id="selectedIdeas"></div>
	        </div>
        <div class="funnel" id="funnelLanes"></div>
      </section>

	    </main>
  </div>

  <dialog id="ideaDialog">
    <div class="modal-head">
	      <span class="tag" id="modalId"></span>
	      <h3 id="modalTitle"></h3>
	      <div class="tags" id="modalTags"></div>
	      <p class="modal-status" id="modalStatus"></p>
	    </div>
	    <div class="modal-body">
	      <div class="modal-copy" id="modalConcept"></div>
	      <div id="modalExpanded"></div>
	    </div>
    <div class="modal-actions">
      <div class="modal-action-group">
        <button class="select-btn" id="toggleSelected">Velg til opptak</button>
        <button class="copy-btn" id="copyBrief">Kopier brief</button>
      </div>
      <button class="close" id="closeDialog">Lukk</button>
    </div>
  </dialog>

      {"id":"X-7","title":"Native vs Danny / HeadshotPro","source":"X-repost","type":"One-off","family":"X - Repost","pillar":"Native","track":"Brand/Investor","platform":"X + TikTok","canFilm":"Ja","requiresSf":"Nei","priority":"Film nå"},
      {"id":"X-3","title":"Native vs Levels / Photo AI","source":"X-repost","type":"One-off","family":"X - Repost","pillar":"Native","track":"Brand/Investor","platform":"X + TikTok","canFilm":"Ja","requiresSf":"Nei","priority":"Film nå"},
      {"id":"R1-1","title":"Agency without the bullshit","source":"Rapport 1","type":"One-off","family":"Post","pillar":"Native","track":"Kunde","platform":"LinkedIn","canFilm":"Ja","requiresSf":"Nei","priority":"Sterk"},

	    const lanes = [
	      { id: "now", title: "Film nå", match: idea => idea.priority === "Film nå" }
	    ];

	    const FILTERS_STORAGE_KEY = "oskarContentFiltersUltraV1";
	    const SELECTED_STORAGE_KEY = "oskarSelectedIdeasUltraV1";
	    const savedFilters = JSON.parse(localStorage.getItem(FILTERS_STORAGE_KEY) || "{}");
	    const filters = {
	      search: "",
	      ...savedFilters
	    };
	    let selectedIds = new Set(JSON.parse(localStorage.getItem(SELECTED_STORAGE_KEY) || "[]"));
	    let currentIdeaId = null;

	    function bucketLabel(idea) {
	      if (idea.priority === "Film nå") return "Film nå";
	      return "Backlog";
	    }

	    function matchesFilters(idea) {
	      const brief = briefs[idea.id] || {};
	      const briefText = [brief.concept, brief.context, brief.say, brief.make, brief.hooks, brief.real, brief.targets, brief.cut, brief.next].flat().filter(Boolean).join(" ");
	      const haystack = [idea.id, idea.title, idea.source, idea.type, idea.family, idea.pillar, idea.track, idea.platform, idea.priority, idea.canFilm, idea.requiresSf, briefText].join(" ").toLowerCase();
	      return !filters.search || haystack.includes(filters.search.toLowerCase());
	    }

	    function makeToolbar(targetId) {
	      const target = document.getElementById(targetId);
	      target.innerHTML = `
	        <input aria-label="Søk" placeholder="Søk i ideer..." data-filter="search">
	      `;
	      target.querySelectorAll("[data-filter]").forEach(control => {
	        control.value = filters.search || "";
	        control.addEventListener("input", event => {
	          filters[event.target.dataset.filter] = event.target.value;
	          localStorage.setItem(FILTERS_STORAGE_KEY, JSON.stringify({ search: filters.search }));
	          renderAll();
	        });
	      });
    }

	    function cardHtml(idea) {
	      const selected = selectedIds.has(idea.id);
	      const brief = briefs[idea.id] || {};
	      const concept = brief.concept || `${idea.pillar} / ${idea.track}`;
	      return `
	        <article class="idea-card ${selected ? "selected" : ""}" data-id="${idea.id}" role="button" tabindex="0">
	          <div class="card-top">
	            <span class="id">${idea.id}</span>
	            <button type="button" class="quick-select ${selected ? "on" : ""}" data-select="${idea.id}" aria-pressed="${selected ? "true" : "false"}">${selected ? "Valgt" : "+ Velg"}</button>
	          </div>
	          <h4>${idea.title}</h4>
	          <p class="concept">${escapeHtml(concept)}</p>
	          <span class="open-brief">Klikk for brief</span>
	        </article>
	      `;
	    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function bulletSection(title, items) {
      if (!items || !items.length) return "";
      return `
        <div class="modal-section">
          <h4>${escapeHtml(title)}</h4>
          <ul>${items.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
        </div>
      `;
    }

    function briefText(idea) {
      const brief = briefs[idea.id];
      if (!brief) return `${idea.id} - ${idea.title}`;
      const sections = [
        ["Hvem dette er:", brief.context],
        ["Hva Oskar kan si:", brief.say],
        ["Hva teamet skal lage:", brief.make],
        ["Hook-forslag:", brief.hooks],
        ["Hva som må være ekte:", brief.real],
        ["Neste targets:", brief.targets],
        ["Kutt / hold enkelt:", brief.cut]
      ];
      return [
        `${idea.id} - ${idea.title}`,
        `Prioritet: ${idea.priority}`,
        `Plattform: ${idea.platform}`,
        `Pilar/spor: ${idea.pillar} / ${idea.track}`,
        "",
        `Konsept: ${brief.concept}`,
        ...sections.flatMap(([title, items]) => items && items.length ? ["", title, ...items.map(item => `- ${item}`)] : []),
        "",
        `Neste steg: ${brief.next}`
      ].join("\n");
    }

    async function writeClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
      }
    }

	    function saveSelected() {
	      localStorage.setItem(SELECTED_STORAGE_KEY, JSON.stringify([...selectedIds]));
	    }

    function toggleSelected(id) {
      if (selectedIds.has(id)) {
        selectedIds.delete(id);
      } else {
        selectedIds.add(id);
      }
      saveSelected();
      renderAll();
      if (currentIdeaId === id) updateModalSelectionButton(id);
    }

    function updateModalSelectionButton(id) {
      const button = document.getElementById("toggleSelected");
      const selected = selectedIds.has(id);
      button.textContent = selected ? "Fjern fra opptak" : "Velg til opptak";
      button.classList.toggle("selected", selected);
    }

	    function renderFunnel() {
	      const filtered = ideas.filter(matchesFilters);
	      const laneMarkup = lanes.map(lane => {
	        const laneIdeas = filtered.filter(lane.match);
	        const body = laneIdeas.length ? laneIdeas.map(cardHtml).join("") : `<div class="empty">Ingen ideer med valgt filter.</div>`;
	        return `<div class="lane"><h3>${lane.title}<span>${laneIdeas.length}</span></h3>${body}</div>`;
	      }).join("");
	      const backlogIdeas = filtered.filter(idea => idea.priority !== "Film nå");
	      const backlogMarkup = `
	        <details class="backlog">
	          <summary>Backlog <span>${backlogIdeas.length}</span></summary>
	          <div class="backlog-grid">
	            ${backlogIdeas.length ? backlogIdeas.map(cardHtml).join("") : `<div class="empty">Ingen backlog med valgt søk.</div>`}
	          </div>
	        </details>
	      `;
	      document.getElementById("funnelLanes").innerHTML = laneMarkup + backlogMarkup;
	    }

	    function renderShootlist() {
	      const selectedIdeas = ideas.filter(idea => selectedIds.has(idea.id));
	      document.querySelector(".shootlist").classList.toggle("is-empty", !selectedIdeas.length);
	      document.getElementById("selectedCount").textContent = `${selectedIdeas.length} valgt`;
	      document.getElementById("selectedIdeas").innerHTML = selectedIdeas.length
	        ? selectedIdeas.map(cardHtml).join("")
	        : "";
	    }

	    function openIdea(id) {
      const idea = ideas.find(item => item.id === id);
      if (!idea) return;
      currentIdeaId = id;
      document.getElementById("modalId").textContent = idea.id;
	      document.getElementById("modalTitle").textContent = idea.title;
	      document.getElementById("modalTags").innerHTML = `
	        <span class="tag">${bucketLabel(idea)}</span>
	      `;
	      document.getElementById("modalStatus").textContent = idea.platform;
	      const brief = briefs[idea.id] || {
        concept: "Kort ide fra masterarket.",
        make: ["Fyll ut hook, scene, eier og proof for denne ideen."],
        hooks: [],
        real: ["Ideen må bestå bygger-test, sannhets-test og en-tese-test."],
        next: "Neste steg: legg inn mer detaljert brief."
	      };
	      document.getElementById("modalConcept").textContent = brief.concept;
	      document.getElementById("modalExpanded").innerHTML = [
        bulletSection("Hvem dette er", brief.context),
        bulletSection("Hva Oskar kan si", brief.say),
	        bulletSection("Hva teamet skal lage", brief.make),
        bulletSection("Hook-forslag", brief.hooks),
	        bulletSection("Hva som må være ekte", brief.real),
        bulletSection("Neste targets", brief.targets),
        bulletSection("Kutt / hold enkelt", brief.cut),
	        bulletSection("Neste steg", [brief.next])
	      ].join("");
	      updateModalSelectionButton(id);
	      document.getElementById("ideaDialog").showModal();
    }

	    function renderAll() {
	      renderShootlist();
	      renderFunnel();
	      document.querySelectorAll(".idea-card").forEach(card => {
	        card.addEventListener("click", () => openIdea(card.dataset.id));
	        card.addEventListener("keydown", event => {
	          if (event.target.closest("[data-select]")) return;
	          if (event.key === "Enter" || event.key === " ") {
	            event.preventDefault();
	            openIdea(card.dataset.id);
	          }
	        });
	      });
	      document.querySelectorAll("[data-select]").forEach(button => {
	        button.addEventListener("click", event => {
	          event.stopPropagation();
	          toggleSelected(event.currentTarget.dataset.select);
	        });
	      });
	    }

    document.getElementById("closeDialog").addEventListener("click", () => {
      document.getElementById("ideaDialog").close();
    });

    document.getElementById("toggleSelected").addEventListener("click", () => {
      if (currentIdeaId) toggleSelected(currentIdeaId);
    });

    document.getElementById("copyBrief").addEventListener("click", async () => {
	      const idea = ideas.find(item => item.id === currentIdeaId);
	      if (!idea) return;
	      const text = briefText(idea);
	      await writeClipboard(text);
	      document.getElementById("copyBrief").textContent = "Kopiert";
	      setTimeout(() => document.getElementById("copyBrief").textContent = "Kopier brief", 1200);
	    });

    document.getElementById("copySelected").addEventListener("click", async () => {
      const selectedIdeas = ideas.filter(idea => selectedIds.has(idea.id));
      if (!selectedIdeas.length) return;
	      const text = selectedIdeas.map(briefText).join("\n\n---\n\n");
	      await writeClipboard(text);
	      document.getElementById("copySelected").textContent = "Kopiert";
	      setTimeout(() => document.getElementById("copySelected").textContent = "Kopier valgte", 1200);
	    });

	    makeToolbar("toolbar");
	    renderAll();
  </script>
